<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-CAM Live Stream</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --border-color: #334155; --text-main: #f8fafc; --text-muted: #94a3b8; }
        body { 
            margin: 0; padding: 2vw; background-color: var(--bg-color); color: var(--text-main); 
            font-family: 'Inter', system-ui, sans-serif; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; box-sizing: border-box;
        }
        .stream-card {
            background-color: var(--card-bg); padding: 2rem; border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4); width: 100%; max-width: 1024px; 
            max-height: 95vh; display: flex; flex-direction: column; border: 1px solid var(--border-color); box-sizing: border-box;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); flex-shrink: 0; 
        }
        h1 { margin: 0; font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: 600; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 9999px; 
            font-size: 0.875rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); transition: all 0.3s ease;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .connecting .status-dot { background-color: #eab308; box-shadow: 0 0 8px #eab308; }
        .connected .status-dot { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
        .disconnected .status-dot { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .video-container {
            position: relative; width: 100%; background-color: #000; border-radius: 12px; overflow: hidden; 
            aspect-ratio: 4 / 3; max-height: 70vh; border: 2px solid var(--border-color); display: flex; 
            justify-content: center; align-items: center;
        }
        #video-stream { width: 100%; height: 100%; object-fit: contain; display: none; }
        .waiting-text { color: var(--text-muted); font-size: clamp(0.8rem, 3vw, 0.9rem); position: absolute; text-align: center; padding: 0 1rem; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        @media (max-width: 600px) { .stream-card { padding: 1rem; border-radius: 12px; } .header { flex-direction: column; gap: 12px; text-align: center; margin-bottom: 1rem; } .video-container { border-radius: 8px; } }
    </style>
</head>
<body>

    <div class="stream-card">
        <div class="header">
            <h1>ESP32-CAM Monitor</h1>
            <div id="status-badge" class="status-badge connecting">
                <span class="status-dot"></span> 
                <span id="status-text">Connecting...</span>
            </div>
        </div>

        <div class="video-container">
            <span id="waiting-text" class="waiting-text">Waiting for video stream...</span>
            <img id="video-stream" src="" alt="Live Stream" />
        </div>
    </div>

    <script>
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        let ws;
        
        const imgElement = document.getElementById('video-stream');
        const waitingText = document.getElementById('waiting-text');
        const statusBadge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');

        function updateStatus(state, text) {
            statusBadge.className = `status-badge ${state}`;
            statusText.textContent = text;
        }

        function connect() {
            ws = new WebSocket(wsUrl);
            ws.binaryType = 'blob'; // Required for stable binary reception

            ws.onopen = () => {
                console.log('Connected to WebSocket server');
                updateStatus('connected', 'Live');
            };
            
            ws.onmessage = (event) => {
                if (event.data instanceof Blob) {
                    if (imgElement.style.display !== 'block') {
                        imgElement.style.display = 'block';
                        waitingText.style.display = 'none';
                    }
                    
                    if (imgElement.src) {
                        URL.revokeObjectURL(imgElement.src);
                    }

                    imgElement.src = URL.createObjectURL(event.data);
                }
            };

            ws.onclose = () => {
                console.log('Disconnected from WebSocket server');
                updateStatus('disconnected', 'Disconnected');
                imgElement.style.display = 'none';
                waitingText.style.display = 'block';
                waitingText.textContent = 'Connection lost. Reconnecting...';
                setTimeout(connect, 1000); // Attempt to reconnect immediately
            };

            ws.onerror = () => ws.close();
        }

        connect();
    </script>
</body>
</html>

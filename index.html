<!DOCTYPE html>
<html>
<head>
    <title>ESP32-CAM Live Stream</title>
    <style>
        body { text-align: center; background-color: #222; color: white; font-family: sans-serif; }
        img { max-width: 100%; border: 3px solid #444; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Live ESP32-CAM Feed</h1>
    <p>Waiting for stream...</p>
    <img id="video-stream" src="" alt="Live Stream" />

    <script>
        // Use WSS (Secure WebSocket) if hosted on Render (HTTPS), otherwise WS
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        const ws = new WebSocket(wsUrl);
        const imgElement = document.getElementById('video-stream');

        ws.onopen = () => console.log('Connected to WebSocket server');
        
        ws.onmessage = (event) => {
            if (event.data instanceof Blob) {
                const urlObject = URL.createObjectURL(event.data);
                imgElement.src = urlObject;
            }
        };

        ws.onclose = () => console.log('Disconnected from WebSocket server');
    </script>
</body>
</html>

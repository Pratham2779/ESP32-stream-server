<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVision | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .stream-container { transition: transform 0.3s ease; }
        .zoomed { transform: scale(1.5); cursor: grab; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 h-screen overflow-hidden flex flex-col font-sans transition-colors duration-300">

    <nav class="bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800 px-6 py-3 flex justify-between items-center z-20 shadow-sm">
        <div class="flex items-center gap-4">
            <div class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75" id="conn-ping"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500 shadow-[0_0_10px_#ef4444]" id="conn-dot"></span>
            </div>
            <h1 class="text-xl font-black tracking-widest text-slate-800 dark:text-white">
                SECURE<span class="text-cyan-500">VISION</span>
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-greeting" class="text-sm font-medium text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full hidden sm:block"></span>
            <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition ring-1 ring-slate-200 dark:ring-slate-800">☀️</button>
            <button id="logoutBtn" class="px-4 py-1.5 bg-red-500/10 text-red-600 dark:text-red-400 hover:bg-red-500 hover:text-white rounded-full transition font-semibold text-sm">Logout</button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        
        <aside class="w-64 bg-white/50 dark:bg-slate-900/50 backdrop-blur-md border-r border-slate-200 dark:border-slate-800 p-5 flex flex-col gap-8 overflow-y-auto z-10">
            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Live Controls
                </h3>
                <div class="space-y-2.5">
                    <button id="btn-stream" class="w-full text-left px-4 py-2.5 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 transition font-medium text-sm">Pause Stream</button>
                    <button id="btn-fullscreen" class="w-full text-left px-4 py-2.5 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 transition font-medium text-sm">Fullscreen</button>
                    <button id="btn-zoom" class="w-full text-left px-4 py-2.5 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 transition font-medium text-sm">Toggle Zoom</button>
                    <button id="btn-snapshot" class="w-full text-left px-4 py-2.5 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 transition font-medium text-sm">Snapshot</button>
                    <button id="btn-record" class="w-full text-left px-4 py-2.5 bg-red-500/10 hover:bg-red-500/20 text-red-600 dark:text-red-400 rounded-lg shadow-sm border border-red-500/20 transition font-medium text-sm">Local Record</button>
                </div>
            </div>

            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    Hardware Settings
                </h3>
                <div class="space-y-2.5">
                    <button id="btn-flashlight" class="w-full text-left px-4 py-2.5 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 transition font-medium text-sm flex justify-between items-center">
                        Night Flash <span class="bg-slate-200 dark:bg-slate-900 px-2 py-0.5 rounded text-xs">OFF</span>
                    </button>
                    <select id="select-res" class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-cyan-500 text-sm font-medium">
                        <option value="9">High Quality (UXGA)</option>
                        <option value="7" selected>Medium Quality (VGA)</option>
                        <option value="5">Low Quality (CIF)</option>
                    </select>
                </div>
            </div>

            <div id="admin-panel" class="hidden mt-auto">
                <button id="btn-add-user" class="w-full text-center px-4 py-2.5 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg shadow-lg shadow-cyan-500/20 transition font-medium text-sm">👥 Add System User</button>
            </div>
        </aside>

        <main class="flex-1 p-6 flex flex-col gap-6 overflow-y-auto relative bg-slate-100/50 dark:bg-[#0B1120]">
            <div class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-8 gap-4">
                <div class="bg-white/70 dark:bg-slate-900/70 backdrop-blur rounded-xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col justify-center items-center">
                    <div class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">FPS</div>
                    <div id="met-fps" class="font-mono text-2xl font-black text-cyan-500">0</div>
                </div>
                <div class="bg-white/70 dark:bg-slate-900/70 backdrop-blur rounded-xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col justify-center items-center">
                    <div class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Ping (s)</div>
                    <div id="met-ping" class="font-mono text-xl font-bold text-green-500">--</div>
                </div>
                <div class="bg-white/70 dark:bg-slate-900/70 backdrop-blur rounded-xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col justify-center items-center">
                    <div class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">WiFi RSSI</div>
                    <div id="met-wifi" class="font-mono text-lg font-medium text-slate-700 dark:text-slate-300">--</div>
                </div>
                <div class="bg-white/70 dark:bg-slate-900/70 backdrop-blur rounded-xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col justify-center items-center">
                    <div class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Temp</div>
                    <div id="met-temp" class="font-mono text-lg font-medium text-slate-700 dark:text-slate-300">--</div>
                </div>
                <div class="bg-white/70 dark:bg-slate-900/70 backdrop-blur rounded-xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col justify-center items-center">
                    <div class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">RAM (KB)</div>
                    <div id="met-ram" class="font-mono text-lg font-medium text-slate-700 dark:text-slate-300">--</div>
                </div>
                <div class="bg-white/70 dark:bg-slate-900/70 backdrop-blur rounded-xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col justify-center items-center overflow-hidden">
                    <div class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">IP Addr</div>
                    <div id="met-ip" class="font-mono text-sm font-medium text-slate-700 dark:text-slate-300 truncate w-full text-center">--</div>
                </div>
                <div class="bg-white/70 dark:bg-slate-900/70 backdrop-blur rounded-xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col justify-center items-center">
                    <div class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Uptime (m)</div>
                    <div id="met-uptime" class="font-mono text-lg font-medium text-slate-700 dark:text-slate-300">--</div>
                </div>
                <div class="bg-white/70 dark:bg-slate-900/70 backdrop-blur rounded-xl border border-slate-200 dark:border-slate-800 p-4 shadow-sm flex flex-col justify-center items-center">
                    <div class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Drops</div>
                    <div id="met-reconn" class="font-mono text-lg font-medium text-red-400">--</div>
                </div>
            </div>

            <div class="relative flex-1 bg-black rounded-2xl border border-slate-800 overflow-hidden flex items-center justify-center shadow-2xl ring-1 ring-white/10 group">
                <div id="waiting-ui" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-sm z-10">
                    <svg class="animate-spin h-12 w-12 text-cyan-500 mb-6" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span class="text-slate-300 font-medium tracking-wide">Awaiting secure transmission...</span>
                </div>
                
                <img id="video-stream" src="" class="stream-container w-full h-full object-contain hidden" />
                <canvas id="record-canvas" class="hidden"></canvas>
                
                <div class="absolute top-4 right-4 bg-red-500/80 backdrop-blur text-white text-[10px] font-bold px-2 py-1 rounded tracking-widest hidden group-hover:block transition-opacity" id="live-badge">LIVE 🔴</div>
            </div>
        </main>

        <aside class="w-80 bg-white/50 dark:bg-slate-900/50 backdrop-blur-md border-l border-slate-200 dark:border-slate-800 p-5 hidden lg:flex flex-col gap-4">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-4 h-4 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
                    AWS S3 Archive
                </h3>
                <button onclick="loadRecordings()" class="text-slate-400 hover:text-cyan-500 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>
            </div>
            
            <div class="flex-1 overflow-y-auto space-y-3 pr-1" id="recordings-list">
                <div class="flex justify-center items-center h-full text-slate-400 text-sm">Loading archives...</div>
            </div>
        </aside>

    </div>

    <div id="addUserModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-2xl border border-slate-200 dark:border-slate-800 w-96 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800 dark:text-white">
                <svg class="w-6 h-6 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                Create New User
            </h2>
            <form id="addUserForm" class="space-y-4">
                <input type="text" id="newUsername" placeholder="Username" required class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 transition">
                <input type="password" id="newPassword" placeholder="Password" required class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-300 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 transition">
                <p id="addUserMsg" class="text-sm hidden font-medium"></p>
                <div class="flex justify-end gap-3 mt-8">
                    <button type="button" id="closeUserModal" class="px-5 py-2.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition font-medium text-slate-700 dark:text-slate-300">Cancel</button>
                    <button type="submit" class="px-5 py-2.5 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg transition font-medium shadow-lg shadow-cyan-500/30">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div id="videoModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-5xl flex justify-between items-center mb-4">
            <h3 id="videoModalTitle" class="text-white font-mono text-lg">Playback</h3>
            <button onclick="closeVideoModal()" class="text-white hover:text-red-400 bg-white/10 p-2 rounded-full transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>
        <video id="cloudVideoPlayer" controls class="w-full max-w-5xl rounded-xl shadow-2xl ring-1 ring-white/20 bg-black"></video>
    </div>

    <script src="/js/dashboard.js"></script>
</body>
</html>
